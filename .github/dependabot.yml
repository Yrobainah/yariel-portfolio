version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
      time: '06:00'
      timezone: Europe/Madrid
    target-branch: master
    open-pull-requests-limit: 5
    versioning-strategy: increase
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      time: '06:30'
      timezone: Europe/Madrid
    target-branch: master
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
